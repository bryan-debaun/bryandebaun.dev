name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # No Playwright browsers needed here: `pnpm test` is vitest with the visual
      # suite excluded. Browser install lives in the a11y-visual workflow.
      - run: pnpm run build
      - run: pnpm test
      - run: pnpm run lint
